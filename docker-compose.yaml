services:
  mysql:
    image: mysql:8.0.32
    container_name: mysql
    restart: always
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    networks:
      - my-network
    depends_on:
      - mysql-job-dbdata
    # 移除了 ports: "13306:3306"，已彻底屏蔽公网直连，请使用 SSH 隧道
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ./mysql/sql:/docker-entrypoint-initdb.d
      - ./mysql/conf.d/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s
    volumes_from:
      - mysql-job-dbdata

  # 自动加载数据
  mysql-job-dbdata:
    image: alpine:3.18.2
    container_name: mysql-job-dbdata
    volumes:
      - /var/lib/mysql


  # Redis
  redis:
    image: redis:6.2
    container_name: redis
    restart: always
    hostname: redis
    privileged: true
    # 移除了 ports: "16379:6379"，已彻底屏蔽公网直连，请使用 SSH 隧道
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - my-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3


  # rabbitmq
  # 账密 wen / 读取变量
  # rabbitmq-plugins enable rabbitmq_management
  rabbitmq:
    image: rabbitmq:3.12.9
    container_name: rabbitmq
    restart: always
    ports:
      - "15672:15672" # 保留：Web 可视化管理面板 (移除了 5672 数据端口)
      - "127.0.0.1:5672:5672"
    environment:
      RABBITMQ_DEFAULT_USER: wen
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    command: rabbitmq-server
    volumes:
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - my-network
    restart: always
  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123456}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards/json
      - ./grafana-data:/var/lib/grafana
    networks:
      - my-network
    depends_on:
      - prometheus
  # MySQL 监控插件 (因为 Prometheus 不能直接读 MySQL，需要这个转换器)
  mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: mysql-exporter
    environment:
      - DATA_SOURCE_NAME=root:${MYSQL_ROOT_PASSWORD}@(mysql:3306)/
    networks:
      - my-network
    depends_on:
      - mysql


  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "127.0.0.1:9200:9200"
      - "127.0.0.1:9300:9300"
    volumes:
      - ./es-data:/usr/share/elasticsearch/data
    networks:
      - my-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: kibana
    restart: always
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "127.0.0.1:5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - my-network

  canal-server:
    image: canal/canal-server:v1.1.8
    container_name: canal-server
    restart: always
    ports:
      - "127.0.0.1:11111:11111"
    volumes:
      - ./canal/server/conf:/home/admin/canal-server/conf
      - ./canal/server/logs:/home/admin/canal-server/logs
    depends_on:
      - mysql
    networks:
      - my-network

  canal-adapter:
    image: canal/canal-adapter:v1.1.8
    container_name: canal-adapter
    restart: always
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ./canal/adapter/conf:/home/admin/canal-adapter/conf
      - ./canal/adapter/logs:/home/admin/canal-adapter/logs
    depends_on:
      - canal-server
      - elasticsearch
    networks:
      - my-network
networks:
  my-network:
    driver: bridge
