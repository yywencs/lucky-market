server:
  http:
    addr: 0.0.0.0:8080
    timeout: 60s
  grpc:
    addr: 0.0.0.0:9000
    timeout: 60s

rabbitmq:
  addresses: 127.0.0.1
  port: 5672
  username: wen
  password: 2R26ug3bLrvVVUBCgmyD4GWe
  listener:
    simple:
      prefetch: 1 # 每次投递n个消息，消费完在投递n个
  topic:
    activity_sku_stock_zero: "activity_sku_stock_zero"
    send_award: "send_award"
    send_rebate: "send_rebate"

data:
  mysql:
    dsn: "root:0kdStFZF7RNwl9oc50wXb3IG@tcp(127.0.0.1:3306)/big_market%s?charset=utf8mb4&parseTime=True&loc=Local&timeout=30s"
    max_open_conns: 25
    # minimum-idle: 15 -> SetMaxIdleConns
    # (在 Go 中，MaxIdleConns 既控制最小空闲也控制最大空闲，通常设置为和 Open 一样或略小)
    max_idle_conns: 15
    # max-lifetime: 1800000ms (30分钟) -> SetConnMaxLifetime
    # Go 的 viper 支持直接读这种时间字符串，非常方便
    max_life_time: 1800s
    # idle-timeout: 180000ms (3分钟) -> SetConnMaxIdleTime
    max_idle_time: 180s
    db_count: 2 # 分库数量
    tb_count: 4 # 分表数量
  redis:
    host: 127.0.0.1
    port: 6379
    db: 0
    pool_size: 10
    min_idle_size: 5
    idle_timeout: 30000
    connect_timeout: 5000
    retry_attempts: 3
    retry_interval: 1000
    ping_interval: 60000
    keep_alive: true
  etcd:
    endpoints: ["127.0.0.1:2379"]
    timeout: 5s                  

asynq:
  redis:
    host: 127.0.0.1
    port: 6379
    db: 1 # 使用不同的DB隔离
    pool-size: 10
    min_idle_size: 5
    idle_timeout: 30000
    connect_timeout: 5000
    retry_attempts: 3
    retry_interval: 1000
    ping_interval: 60000
    keep_alive: true
  concurrency: 10 # 消费者并发数量

log:
  level: "info"              # 日志级别: debug, info, warn, error
  filename: "./logs/app.log" # 日志文件路径
  max_size: 100              # 单个文件最大 100MB
  max_backups: 3             # 最多保留 3 个旧文件
  max_age: 30                # 最多保留 30 天 (彩票业务建议久一点)
  compress: true             # 开启压缩

dcc:
  rate_limit: 5                # 限流阈值: 1000 次/秒
  enable_degrade: false           # 降级开关默认关闭
  black_list: ""                  # 黑名单默认为空

# 应用只暴露指标端点，Prometheus/Grafana 自身配置在 monitoring/ 目录维护。
monitor:
  enable: true
  addr: 0.0.0.0:9091
  path: /metrics
